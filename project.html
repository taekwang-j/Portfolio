<style>
        body {
            background-color: #F8F9FF;
            color: #121C29;
            -webkit-font-smoothing: antialiased;
        }
        .participation-bar {
            height: 4px;
            background: #E5EEFF;
            position: relative;
            border-radius: 2px;
        }
        .participation-fill {
            height: 100%;
            background: #0042C7;
            border-radius: 2px;
            transition: width 1s ease-out;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #F8F9FF;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #D9E3F5;
            border-radius: 10px;
        }
    </style>
</head>
<body class="font-body-md text-body-md overflow-x-hidden custom-scrollbar">
<main class="pb-16 max-w-container-max mx-auto pt-16 px-4 md:px-margin-desktop md:pt-32">
<!-- Header Section -->
<header class="mb-16">
<div class="flex flex-col md:flex-row md:items-end justify-between gap-8">
<div class="max-w-2xl">
<a class="group inline-flex items-center gap-2 text-secondary font-label-sm text-label-sm mb-6 hover:translate-x-[-4px] transition-transform" href="/">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Back to Overview
                </a>
<h1 class="font-display-lg text-display-lg mb-4">Selected Projects</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">글로벌 클라이언트를 위한 8년간의 시니어 웹 퍼블리싱 경험을 바탕으로, 정밀한 실무 실행력과 기술적 전략이 담긴 프로젝트 아카이브입니다.</p>
</div>
</div>
</header>
<!-- Projects Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="projects-grid">
</div>
</main>
<button class="fixed bottom-8 right-8 w-12 h-12 bg-primary text-on-primary rounded-full shadow-lg flex items-center justify-center transition-opacity duration-300 z-50 hover:scale-110 active:scale-95 opacity-0" id="back-to-top">
<span class="material-symbols-outlined">arrow_upward</span>
</button>
<script>
    // Real project data: title + live URL
    const container = document.getElementById('projects-grid');
    const projects = [
        { title: "Genesystem", url: "https://www.genesystem.co.kr/" },
        { title: "SB위드아그로", url: "https://www.sbwithagro.kr/" },
        { title: "ESMOD SEOUL (에스모드 서울)", url: "https://www.esmod.co.kr/" },
        { title: "민락체육예약시스템", url: "https://minlak.eticket.or.kr/" },
        { title: "새미네부엌", url: "https://semie.cooking/" },
        { title: "전국은행연합회", url: "https://www.kfb.or.kr/member/index_2023.html" },
        { title: "바른자세 제통의원", url: "http://painless.kr/" },
        { title: "진단용방사선 안전관리책임자교육", url: "https://radiationsafe.or.kr/" },
        { title: "라라올라", url: "https://www.lalaola.com/" },
        { title: "영등포농협 사회공헌실천재단", url: "https://ydpfoundation.com/" },
        { title: "용각산쿨", url: "https://yonggaksancool.co.kr/" },
        { title: "세자해 플랫폼 (2026 세계 자원봉사자의 해)", url: "https://ivy2026korea.or.kr/" },
        { title: "국립암센터 국가암검진 질향상교육", url: "https://neweducation.ncc.re.kr/index.html" },
        { title: "클리니크 후즈후", url: "http://www.cliniquehushu.com/" },
        { title: "헬스와이즈", url: "http://healthwise.co.kr/" },
        { title: "쿠무다 명상문화센터", url: "http://kumuda.co.kr/" },
        { title: "엘리바바(eleVaVa)", url: "http://elevava.com/" },
        { title: "경기도립노인전문시흥병원", url: "http://www.gshospital.com/" },
        { title: "서울아산이비인후과", url: "http://www.seoulasan-ent.com/" },
        { title: "서남동행 (서울특별시 서남병원 공공의료본부)", url: "https://phs.seoulsnh.or.kr/" },
        { title: "서울대항유외과의원", url: "http://www.seouldhu.surgery/" },
        { title: "매듭병원", url: "http://knothospital.com/" },
        { title: "라팡산부인과의원", url: "http://www.lapin.co.kr/" },
        { title: "더바름정형외과", url: "https://thebareum.com/" },
        { title: "검단연세이비인후과의원", url: "http://gdysent.co.kr/" },
        { title: "서울탑안과의원 (청주)", url: "http://topretina.co.kr/" },
        { title: "장튼위튼병원", url: "http://www.good-jang.com/" },
        { title: "충무로필한의원", url: "http://chungmuro-philhospital.com/" },
        { title: "청주필한방병원", url: "https://www.cheongju-philhospital.com/" },
        { title: "어니스트여성의원", url: "http://www.honestclinic.com/" },
        { title: "서울특별시북부지역장애인보건의료센터", url: "http://www.seoulnhc.com/" },
        { title: "서울재활병원", url: "https://seoulrh.com/" },
        { title: "이종신재활의학과의원", url: "http://ljshosp.co.kr/" },
        { title: "삼성봄내과의원", url: "http://samsungbom.com/" },
        { title: "청주담대항외과의원", url: "http://damdaehang.co.kr/" },
        { title: "H리버스에이징센터", url: "http://hreverseagingcenter.com/" },
        { title: "뉴고려병원", url: "https://www.nkhospital.net/" }
    ];

    projects.forEach((item) => {
        const link = document.createElement('a');
        link.href = item.url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.className = "group block bg-surface-container-lowest p-6 rounded-xl shadow-[0px_4px_20px_rgba(26,43,76,0.04)] hover:translate-y-[-4px] transition-all duration-300 border-b-2 border-transparent hover:border-secondary";
        link.innerHTML = `
            <div class="aspect-video mb-6 overflow-hidden rounded-lg bg-surface-container">
                <div class="w-full h-full bg-surface-variant/50 animate-pulse flex items-center justify-center">
                    <iframe 
						src="${projects.url}"
						class="w-full h-full"
						loading="lazy">
					</iframe>
                </div>
            </div>
            <div class="mb-4">
                <h3 class="font-headline-md text-headline-md">${item.title}</h3>
            </div>
            <div class="mb-0">
                <div class="flex justify-between font-label-sm text-label-sm mb-2">
                    <span class="text-on-surface-variant">Participation</span>
                    <span class="text-secondary font-bold">100%</span>
                </div>
                <div class="participation-bar">
                    <div class="participation-fill" style="width: 100%;"></div>
                </div>
            </div>
        `;
        container.appendChild(link);
    });

    // Micro-interactions for buttons
    document.querySelectorAll('button, a').forEach(el => {
        el.addEventListener('mousedown', () => el.classList.add('scale-95'));
        el.addEventListener('mouseup', () => el.classList.remove('scale-95'));
        el.addEventListener('mouseleave', () => el.classList.remove('scale-95'));
    });

    // Intersection Observer for participation bars
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const fill = entry.target.querySelector('.participation-fill');
                if (fill) {
                    const targetWidth = fill.style.width;
                    fill.style.width = '0%';
                    setTimeout(() => {
                        fill.style.width = targetWidth;
                    }, 100);
                }
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('#projects-grid > a').forEach(card => {
        observer.observe(card);
    });

    // Back to top functionality
    const backToTopBtn = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
            backToTopBtn.classList.remove('opacity-0');
            backToTopBtn.classList.add('opacity-100');
        } else {
            backToTopBtn.classList.remove('opacity-100');
            backToTopBtn.classList.add('opacity-0');
        }
    });
    backToTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
</script>
</body></html>
